name: Embodied HA
version: "1.25.4"
slug: embodied_ha
description: "A little spirit moves into your smart home. Home Assistant, embodied: eyes from cameras, ears from microphones, a voice from speakers — and memories that grow into a life together."
arch:
  - amd64
  - aarch64
init: true
startup: application
boot: manual
# /config を読み書きマウント（/config/.tools の認証・CLIを再利用し、スクリプト群も参照）
map:
  - config:rw
audio: true
# MQTTブローカー情報を Supervisor から注入してもらう
services:
  - mqtt:need
hassio_api: true
homeassistant_api: true
ingress: true
ingress_port: 8099
panel_icon: mdi:robot-outline
options:
  resident_name: "ユーザー"
  claude_api_key: ""
  claude_config_dir: ""
  claude_cwd: ""
  autonomous_control: false
schema:
  resident_name: str
  claude_api_key: str?
  claude_config_dir: str?
  claude_cwd: str?
  autonomous_control: bool
